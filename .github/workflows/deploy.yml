name: Deploy site para GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar site/ + planos/ para raiz
        run: |
          rm -rf .github node_modules
          cp -r petrobras-quimica-study-plan/site/* .
          cp -r petrobras-quimica-study-plan/planos .
          rm -rf petrobras-quimica-study-plan
          find . -name '.gitignore' -type f -delete

      - name: Deploy para gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
