name: Deploy para GitHub Pages + VM

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Buildar Vite
        run: npm run build

      - name: Preparar deploy (copiar server.js + planos + package.json para dist/)
        run: |
          cp server.js dist/server.js
          cp package.json dist/package.json
          cp -r petrobras-quimica-study-plan/planos dist/planos

      - name: Deploy para gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Deploy para VM
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_KEY }}
          SOURCE: ./dist/
          REMOTE_HOST: ${{ secrets.VM_HOST }}
          REMOTE_USER: ${{ secrets.VM_USER }}
          TARGET: /opt/petrobras/
          SCRIPT_BEFORE: |
            rm -rf /opt/petrobras/dist/
            rm -rf /opt/petrobras/server.js
            rm -rf /opt/petrobras/planos/
            rm -rf /opt/petrobras/package.json
          SCRIPT_AFTER: |
            cd /opt/petrobras && npm install && sudo systemctl restart petrobras.service
